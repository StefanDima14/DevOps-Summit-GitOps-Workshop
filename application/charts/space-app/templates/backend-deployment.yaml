apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "space-app.fullname" . }}-backend
  labels:
    {{- include "space-app.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "space-app.labels" . | nindent 8 }}
        app: backend
      annotations:
        # Roll pods when ConfigMap/Secret change so env vars are re-read.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: backend
          image: {{ include "space-app.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "space-app.fullname" . }}-config
            - secretRef:
                name: {{ include "space-app.fullname" . }}-secret
