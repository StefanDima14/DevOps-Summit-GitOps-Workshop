<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Space Gallery</title>
  <style>
    :root { --accent: #ffd166; }
    body { font-family: sans-serif; background: #0b1a3a; color: #eee; text-align: center; margin: 0; padding: 40px; }
    h1 { color: var(--accent); }
    img { max-width: 700px; border: 3px solid var(--accent); border-radius: 8px; margin-top: 20px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: var(--accent); border: none; border-radius: 4px; }
    .title { margin-top: 15px; font-size: 22px; color: var(--accent); }
    .version { position: fixed; top: 10px; right: 10px; background: var(--accent); color: #0b1a3a; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="version">frontend v2</div>
  <h1 id="greeting">🚀 Space Gallery</h1>
  <button onclick="load()">Get Random Image</button>
  <div><img id="img" src="" alt=""></div>
  <div class="title" id="title"></div>
  <script>
    async function loadConfig() {
      const r = await fetch('/api/config');
      const c = await r.json();
      if (c.greeting) document.getElementById('greeting').textContent = c.greeting;
      if (c.themeAccent) document.documentElement.style.setProperty('--accent', c.themeAccent);
    }
    async function load() {
      const r = await fetch('/api/image');
      const d = await r.json();
      document.getElementById('img').src = d.url;
      document.getElementById('title').textContent = d.title || '';
    }
    loadConfig();
    load();
  </script>
</body>
</html>
